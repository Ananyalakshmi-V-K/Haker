<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="assets/css/styles.css" rel="stylesheet" />
</head>
<body>
  <header class="border-bottom app-header">
    <nav class="container py-3 d-flex justify-content-between align-items-center">
      <strong class="d-flex align-items-center gap-2">
        <svg width="34" height="34" viewbox="0 0 34 34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="0" y="0" width="34" height="34" rx="10" fill="#d4a017"></rect>
          <path d="M10 20c0-4 3-7 7-7s7 3 7 7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"></path>
          <circle cx="14" cy="15" r="1.4" fill="#fff"></circle>
          <circle cx="20" cy="15" r="1.4" fill="#fff"></circle>
          <path d="M14 23h6" stroke="#fff" stroke-width="2" stroke-linecap="round"></path>
        </svg>
        <span>Haker</span>
      </strong>

      <div class="d-flex align-items-center gap-3">
        <div class="text-end d-none d-sm-block">
          <div id="headerUserName" class="small fw-500">User</div>
          <div id="headerUserEmail" class="text-muted" style="font-size: 0.8rem;">email@example.com</div>
        </div>
        <div id="profileMenu" class="profile-menu">
          <button id="profileAvatarBtn" class="profile-avatar" type="button" aria-label="Profile menu">
            <span id="profileAvatarText">U</span>
          </button>
          <div class="profile-dropdown">
            <button id="menuDetailsBtn" type="button" class="profile-menu-item">Details</button>
            <button id="menuLogoutBtn" type="button" class="profile-menu-item">Logout</button>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main class="container py-4">
    <div id="profileDetailsCard" class="card mb-3 d-none">
      <div class="card-body">
        <h2 class="h6 mb-3">Profile Details</h2>
        <div class="row g-3">
          <div class="col-12 col-md-6">
            <label class="form-label" for="profileName">Name</label>
            <input id="profileName" class="form-control" type="text" readonly />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label" for="profileEmail">Email</label>
            <input id="profileEmail" class="form-control" type="text" readonly />
          </div>
          <div class="col-12 col-md-8">
            <label class="form-label" for="newPassword">Set Password</label>
            <input id="newPassword" class="form-control" type="password" placeholder="At least 6 characters" autocomplete="new-password" />
          </div>
          <div class="col-12 col-md-4 d-flex align-items-end">
            <button id="setPasswordBtn" type="button" class="btn btn-primary w-100">Set Password</button>
          </div>
        </div>
        <div id="profileMessage" class="small mt-3" role="status" aria-live="polite"></div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-12 col-lg-4">
        <div class="card h-100">
          <div class="card-body">
            <h1 class="h5 mb-3">Add Daily Log</h1>
            <div class="mb-3">
              <label for="habitDate" class="form-label">Date</label>
              <input id="habitDate" type="date" class="form-control" />
            </div>
            <div class="mb-3">
              <label for="habitType" class="form-label">Habit</label>
              <select id="habitType" class="form-select">
                <option value="gym">Gym</option>
                <option value="study">Study</option>
                <option value="water">Water Intake</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="habitValue" class="form-label">Value</label>
              <input id="habitValue" type="number" class="form-control" min="0" max="1000" value="1" />
              <div class="form-text">Use minutes, glasses, or count as needed.</div>
            </div>
            <button id="saveHabitBtn" type="button" class="btn btn-primary w-100">Save Log</button>
            <div id="habitMessage" class="small mt-3" role="status" aria-live="polite"></div>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-8">
        <div class="row g-3 mb-3">
          <div class="col-12 col-md-4">
            <div class="card streak-card h-100">
              <div class="card-body text-center">
                <div class="text-muted small">Gym Streak</div>
                <div id="streakGym" class="streak-circle">0</div>
                <div class="streak-note">Ring = today's completion</div>
              </div>
            </div>
          </div>
          <div class="col-12 col-md-4">
            <div class="card streak-card h-100">
              <div class="card-body text-center">
                <div class="text-muted small">Study Streak</div>
                <div id="streakStudy" class="streak-circle">0</div>
                <div class="streak-note">Ring = today's completion</div>
              </div>
            </div>
          </div>
          <div class="col-12 col-md-4">
            <div class="card streak-card h-100">
              <div class="card-body text-center">
                <div class="text-muted small">Water Streak</div>
                <div id="streakWater" class="streak-circle">0</div>
                <div class="streak-note">Ring = today's completion</div>
              </div>
            </div>
          </div>
        </div>

        <div class="card mb-3">
          <div class="card-body">
            <h2 class="h6 mb-3">Last 14 Days Progress</h2>
            <div class="chart-wrap">
              <canvas id="habitChart"></canvas>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-body">
            <h2 class="h6 mb-3">Recent Logs</h2>
            <div class="table-responsive">
              <table class="table table-sm align-middle mb-0">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Habit</th>
                    <th>Value</th>
                  </tr>
                </thead>
                <tbody id="logsTableBody">
                  <tr><td colspan="3" class="text-muted">Loading logs...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
