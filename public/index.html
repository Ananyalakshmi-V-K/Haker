<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GUVI Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="assets/css/styles.css" rel="stylesheet" />
</head>
<body>
  <main class="container min-vh-100 d-flex align-items-center justify-content-center py-4">
    <section id="authShell" class="card auth-shell w-100 is-register">
      <div class="card-body p-0">
        <div class="row g-0 auth-grid">
          <div class="col-12 col-md-6 p-4 p-md-5 d-flex flex-column justify-content-center auth-prompt-left">
            <h1 class="h4 mb-2">Already registered?</h1>
            <p class="text-muted mb-3">Use your email and password to continue.</p>
            <button id="showLoginBtn" type="button" class="btn btn-outline-primary">Login</button>
          </div>

          <div class="col-12 col-md-6 p-4 p-md-5 d-flex flex-column justify-content-center auth-prompt-right">
            <h1 class="h4 mb-2">Doesn’t have an account?</h1>
            <p class="text-muted mb-3">Create an account to start tracking habits.</p>
            <button id="showRegisterBtn" type="button" class="btn btn-outline-primary">Register</button>
          </div>
        </div>

        <div class="auth-panel auth-panel-register p-4 p-md-5">
          <div class="d-flex align-items-center mb-3">
            <svg width="32" height="32" viewbox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect width="32" height="32" rx="8" fill="currentColor"></rect>
              <path d="M8 10h16v3H8zm0 6h12v3H8zm0 6h9v3H8z" fill="#fff"></path>
            </svg>
            <h2 class="h5 mb-0 ms-2">Register</h2>
          </div>

          <div class="mb-3">
            <label for="registerName" class="form-label">Name</label>
            <input id="registerName" type="text" class="form-control" placeholder="Your name" autocomplete="name" />
          </div>
          <div class="mb-3">
            <label for="registerEmail" class="form-label">Email</label>
            <input id="registerEmail" type="email" class="form-control" placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="mb-3">
            <label for="registerPassword" class="form-label">Password</label>
            <input id="registerPassword" type="password" class="form-control" placeholder="At least 6 characters" autocomplete="new-password" />
          </div>
          <button id="registerBtn" type="button" class="btn btn-primary w-100">Register</button>
        </div>

        <div class="auth-panel auth-panel-login p-4 p-md-5">
          <div class="d-flex align-items-center mb-3">
            <svg width="32" height="32" viewbox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect width="32" height="32" rx="8" fill="currentColor"></rect>
              <path d="M8 10h16v3H8zm0 6h12v3H8zm0 6h9v3H8z" fill="#fff"></path>
            </svg>
            <h2 class="h5 mb-0 ms-2">Login</h2>
          </div>

          <div class="mb-3">
            <label for="loginEmail" class="form-label">Email</label>
            <input id="loginEmail" type="email" class="form-control" placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="mb-3">
            <label for="loginPassword" class="form-label">Password</label>
            <input id="loginPassword" type="password" class="form-control" placeholder="Enter password" autocomplete="current-password" />
          </div>
          <button id="loginBtn" type="button" class="btn btn-primary w-100">Login</button>
        </div>

        <div id="message" class="small auth-message px-4 pb-4 px-md-5" role="status" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
